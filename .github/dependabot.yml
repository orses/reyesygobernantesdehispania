version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
      - security
    commit-message:
      prefix: deps
      include: scope
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      npm-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
