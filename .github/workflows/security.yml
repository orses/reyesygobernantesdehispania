name: Security & Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    name: Audit, Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # npm ci garantiza instalación exacta del package-lock.json
      # y falla si hay discrepancias (a diferencia de npm install)
      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Lint (incluye no-eval y reglas de seguridad)
        run: npm run lint

      - name: Type-check (strict)
        run: npx tsc --noEmit

      - name: Tests
        run: npm test
